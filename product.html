<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Product | MotoZ</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <header class="site-header">
          <a class="brand" href="index.html">
        <img src="logo.png" class="logo" alt="MotoZ Logo" />
        <span class="site-title">MotoZ</span>
      </a>
    <nav class="nav-links">
      <a href="index.html">Home</a>
      <a href="cart.html" class="cart-link"><span class="cart-icon">🛒</span> Cart <span class="cart-count" id="cartCount">0</span></a>
    </nav>
  </header>

  <main class="page" id="productView">
    <div class="product-layout">
      <section class="gallery">
        <img id="mainImage" class="main-image" src="" alt="Product image">
        <div id="thumbContainer" class="thumbs"></div>
      </section>

      <section class="product-info">
        <h2 id="productName"></h2>
        <div class="price" id="productPrice"></div>

        <div class="form-row">
          <label for="colorSelect">Select Color</label>
          <select id="colorSelect"></select>
        </div>

        <div class="form-row">
          <label for="quantityInput">Quantity</label>
          <input type="number" id="quantityInput" value="1" min="1">
        </div>

        <button class="btn" id="addToCartButton"><span class="cart-icon">🛒</span> Add to Cart</button>
      </section>
    </div>
  </main>

  <script src="js/products.js"></script>
  <script src="js/cart.js"></script>
  <script src="js/gallery.js"></script>
  <script src="js/product.js"></script>
  <script src="js/lightbox.js"></script>
</body>
</html>
